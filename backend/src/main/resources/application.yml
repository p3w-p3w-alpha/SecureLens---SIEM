spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/securelens_db
    username: postgres
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:dGhpc0lzQVZlcnlMb25nU2VjcmV0S2V5Rm9yU2VjdXJlTGVuc0RldmVsb3BtZW50T25seQ==}

securelens:
  api-keys:
    virustotal: ${env.VT_API_KEY:${VT_API_KEY:}}
    abuseipdb: ${env.ABUSEIPDB_API_KEY:${ABUSEIPDB_API_KEY:}}
    shodan: ${env.SHODAN_API_KEY:${SHODAN_API_KEY:}}
    otx: ${env.OTX_API_KEY:${OTX_API_KEY:}}
    mistral: ${env.MISTRAL_API_KEY:${MISTRAL_API_KEY:}}
